version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: sales-crm-mongo
    ports:
      - "27018:27018"
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    volumes:
      - mongo-data:/data/db

  mongo-init:
    image: mongo:8.0
    depends_on:
      - mongodb
    restart: "no"
    entrypoint: [
      "bash",
      "-c",
      "until mongosh --host mongodb --port 27018 --eval 'db.runCommand({ping: 1})' &>/dev/null; do echo 'Waiting for MongoDB to be ready...'; sleep 1; done; mongosh --host mongodb --port 27018 --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"localhost:27018\"}]})' && echo 'Replica set rs0 initialized successfully'"
    ]

volumes:
  mongo-data:
